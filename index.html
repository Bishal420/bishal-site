<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Registration Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="floating-bg" id="parallaxArea">
        <div class="parallax-layer" data-speed="2" style="top: 5%; left: 10%;">
            <i class="fa-solid fa-pencil float-icon" style="font-size: 3rem; animation-duration: 4s;"></i>
        </div>
        <div class="parallax-layer" data-speed="-3" style="top: 70%; left: 85%;">
            <i class="fa-solid fa-eraser float-icon" style="font-size: 4rem; animation-duration: 6s; animation-delay: 1s;"></i>
        </div>
        <div class="parallax-layer" data-speed="4" style="top: 15%; left: 80%;">
            <i class="fa-solid fa-book float-icon" style="font-size: 4.5rem; animation-duration: 5s; animation-delay: 2s;"></i>
        </div>
        <div class="parallax-layer" data-speed="-2" style="top: 85%; left: 15%;">
            <i class="fa-solid fa-graduation-cap float-icon" style="font-size: 4rem; animation-duration: 7s; animation-delay: 0.5s;"></i>
        </div>
        <div class="parallax-layer" data-speed="1.5" style="top: 40%; left: 5%;">
            <i class="fa-solid fa-apple-whole float-icon" style="font-size: 3rem; animation-duration: 4.5s; animation-delay: 1.5s;"></i>
        </div>
        <div class="parallax-layer" data-speed="-1.5" style="top: 50%; left: 90%;">
            <i class="fa-solid fa-calculator float-icon" style="font-size: 3.5rem; animation-duration: 5.5s; animation-delay: 3s;"></i>
        </div>
        <div class="parallax-layer" data-speed="3" style="top: 8%; left: 45%;">
            <i class="fa-solid fa-palette float-icon" style="font-size: 2.5rem; animation-duration: 6.5s; animation-delay: 2.5s;"></i>
        </div>
        <div class="parallax-layer" data-speed="-4" style="top: 90%; left: 50%;">
            <i class="fa-solid fa-flask float-icon" style="font-size: 3.5rem; animation-duration: 4.8s; animation-delay: 0.8s;"></i>
        </div>
        
        <div class="parallax-layer" data-speed="2.5" style="top: 25%; left: 25%;">
            <i class="fa-solid fa-microscope float-icon" style="font-size: 3.2rem; animation-duration: 5.2s; animation-delay: 1.2s;"></i>
        </div>
        <div class="parallax-layer" data-speed="-2.5" style="top: 65%; left: 10%;">
            <i class="fa-solid fa-globe float-icon" style="font-size: 4.2rem; animation-duration: 6.8s; animation-delay: 0.3s;"></i>
        </div>
        <div class="parallax-layer" data-speed="3.5" style="top: 30%; left: 65%;">
            <i class="fa-solid fa-ruler float-icon" style="font-size: 2.8rem; animation-duration: 4.1s; animation-delay: 2.1s;"></i>
        </div>
        <div class="parallax-layer" data-speed="-1.8" style="top: 80%; left: 35%;">
            <i class="fa-solid fa-compass float-icon" style="font-size: 3.8rem; animation-duration: 7.5s; animation-delay: 1.8s;"></i>
        </div>
        <div class="parallax-layer" data-speed="4.5" style="top: 12%; left: 60%;">
            <i class="fa-solid fa-pen-nib float-icon" style="font-size: 2.2rem; animation-duration: 5.9s; animation-delay: 0.9s;"></i>
        </div>
        <div class="parallax-layer" data-speed="-3.2" style="top: 55%; left: 20%;">
            <i class="fa-solid fa-paperclip float-icon" style="font-size: 2.6rem; animation-duration: 4.7s; animation-delay: 2.7s;"></i>
        </div>
        <div class="parallax-layer" data-speed="1.2" style="top: 75%; left: 70%;">
            <i class="fa-solid fa-lightbulb float-icon" style="font-size: 3.4rem; animation-duration: 6.2s; animation-delay: 1.4s;"></i>
        </div>
        <div class="parallax-layer" data-speed="-4.2" style="top: 35%; left: 90%;">
            <i class="fa-solid fa-atom float-icon" style="font-size: 4.5rem; animation-duration: 5.8s; animation-delay: 0.6s;"></i>
        </div>
        <div class="parallax-layer" data-speed="2.8" style="top: 92%; left: 80%;">
            <i class="fa-solid fa-square-root-variable float-icon" style="font-size: 2.9rem; animation-duration: 6.1s; animation-delay: 3.2s;"></i>
        </div>
        <div class="parallax-layer" data-speed="-2.1" style="top: 45%; left: 75%;">
            <i class="fa-solid fa-book-open float-icon" style="font-size: 3.1rem; animation-duration: 4.9s; animation-delay: 1.7s;"></i>
        </div>
        <div class="parallax-layer" data-speed="3.8" style="top: 20%; left: 40%;">
            <i class="fa-solid fa-language float-icon" style="font-size: 3.7rem; animation-duration: 7.2s; animation-delay: 0.4s;"></i>
        </div>
        <div class="parallax-layer" data-speed="-1.4" style="top: 60%; left: 45%;">
            <i class="fa-solid fa-brain float-icon" style="font-size: 4.1rem; animation-duration: 5.3s; animation-delay: 2.4s;"></i>
        </div>
        <div class="parallax-layer" data-speed="2.2" style="top: 88%; left: 25%;">
            <i class="fa-solid fa-school float-icon" style="font-size: 3.3rem; animation-duration: 6.7s; animation-delay: 1.1s;"></i>
        </div>
        <div class="parallax-layer" data-speed="-3.6" style="top: 15%; left: 95%;">
            <i class="fa-solid fa-award float-icon" style="font-size: 2.7rem; animation-duration: 4.4s; animation-delay: 2.9s;"></i>
        </div>
        <div class="parallax-layer" data-speed="1.9" style="top: 2%; left: 30%;">
            <i class="fa-solid fa-code float-icon" style="font-size: 2.5rem; animation-duration: 5.1s; animation-delay: 0.7s;"></i>
        </div>
        <div class="parallax-layer" data-speed="-2.7" style="top: 95%; left: 5%;">
            <i class="fa-solid fa-laptop-code float-icon" style="font-size: 3.6rem; animation-duration: 6.4s; animation-delay: 2.2s;"></i>
        </div>
    </div>

    <div class="form-container">
        <h2>Student Portal</h2>
        <div class="subtitle">Complete your school registration below</div>
        
        <form id="registrationForm" class="form-grid" novalidate>
            
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Juan Dela Cruz" required>
                <span class="error-message" id="fullNameError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="student@school.edu" required>
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" name="studentId" placeholder="e.g. 202300123" required pattern="\d+">
                <span class="error-message" id="studentIdError"></span>
            </div>

            <div class="form-group">
                <label for="course">Course</label>
                <select id="course" name="course" required>
                    <option value="">-- Select a Course --</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Business Administration">Business Administration</option>
                </select>
                <span class="error-message" id="courseError"></span>
            </div>

            <fieldset class="form-group full-width">
                <legend>Year Level</legend>
                <div class="radio-group">
                    <label><input type="radio" name="yearLevel" value="1st Year" required> 1st Year</label>
                    <label><input type="radio" name="yearLevel" value="2nd Year"> 2nd Year</label>
                    <label><input type="radio" name="yearLevel" value="3rd Year"> 3rd Year</label>
                    <label><input type="radio" name="yearLevel" value="4th Year"> 4th Year</label>
                </div>
                <span class="error-message" id="yearLevelError"></span>
            </fieldset>

            <fieldset class="form-group full-width">
                <legend>Gender</legend>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="Male" required> Male</label>
                    <label><input type="radio" name="gender" value="Female"> Female</label>
                    <label><input type="radio" name="gender" value="Other"> Other</label>
                </div>
                <span class="error-message" id="genderError"></span>
            </fieldset>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8">
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
                
                <div class="strength-meter-container">
                    <div class="strength-meter-bar" id="strengthBar"></div>
                </div>
                <span class="strength-text" id="strengthText"></span>
                <span class="error-message" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required minlength="8">
                    <button type="button" class="toggle-password" id="toggleConfirmPassword" aria-label="Toggle confirm password visibility">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
                <span class="error-message" id="confirmPasswordError"></span>
            </div>

            <div class="button-group">
                <button type="submit" id="submitBtn">Register Student</button>
                <button type="reset" id="resetBtn">Clear Form</button>
            </div>

            <div id="successMessage" class="hidden">
                Registration Successful! Welcome to the school.
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
