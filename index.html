<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MAISON</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <h1 class="logo">MAISON</h1>
  <nav>
    <a href="#">Shop</a>
    <a href="#">Collections</a>
    <a href="#">About</a>
  </nav>
  <div class="cart">🛒</div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h2>Timeless Style, Modern Living</h2>
    <p>Discover curated essentials designed for everyday elegance.</p>
    <button>Shop Now</button>
  </div>
</section>

<!-- CATEGORIES -->
<section class="categories">
  <div class="cat">Men</div>
  <div class="cat">Women</div>
  <div class="cat">Accessories</div>
</section>

<!-- PRODUCTS -->
<section class="products">
  <h2>Featured Products</h2>

  <div class="grid">
    <div class="product">
      <img src="https://via.placeholder.com/300">
      <h3>Classic Coat</h3>
      <p>$120</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/300">
      <h3>Minimal Shirt</h3>
      <p>$40</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/300">
      <h3>Leather Bag</h3>
      <p>$90</p>
      <button>Add to Cart</button>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 MAISON — All rights reserved</p>
</footer>

<script src="script.js"></script>
</body>
</html>
