<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ultra Glass Clock</title>

<style>
:root {
  --bg: #050508;
  --glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.12);
  --primary: #00f3ff;
  --secondary: #bc13fe;
  --text: #fff;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at 30% 30%, #111, #000);
  font-family: system-ui;
  overflow:hidden;
}

/* Animated gradient background */
body::before {
  content:"";
  position:absolute;
  width:200%; height:200%;
  background: conic-gradient(from 0deg, var(--primary), var(--secondary), var(--primary));
  animation: rotateBg 20s linear infinite;
  filter: blur(120px);
  opacity:0.3;
}

@keyframes rotateBg {
  to { transform: rotate(360deg); }
}

.card {
  width:320px;
  height:320px;
  border-radius:50%;
  backdrop-filter: blur(30px);
  background: var(--glass);
  border:1px solid var(--border);
  box-shadow: 0 30px 80px rgba(0,0,0,0.8);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  transition: all 0.6s cubic-bezier(.68,-0.55,.27,1.55);
}

/* Glow ring */
.card::after {
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:inherit;
  background: linear-gradient(45deg, var(--primary), var(--secondary));
  filter: blur(20px);
  opacity:0.6;
  z-index:-1;
}

.time {
  font-size:3rem;
  font-weight:700;
  letter-spacing:2px;
  background: linear-gradient(90deg, #fff, var(--primary));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: glowText 3s ease-in-out infinite;
}

@keyframes glowText {
  0%,100% { filter: drop-shadow(0 0 10px var(--primary)); }
  50% { filter: drop-shadow(0 0 25px var(--secondary)); }
}

/* Mouse tilt effect */
.card {
  transform-style: preserve-3d;
}

</style>
</head>

<body>

<div class="card" id="card">
  <div class="time" id="time">00:00</div>
</div>

<script>
const card = document.getElementById('card');
const timeEl = document.getElementById('time');

function updateTime(){
  const d = new Date();
  const pad = n=>n.toString().padStart(2,'0');
  timeEl.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
setInterval(updateTime,1000);
updateTime();

/* 3D tilt */
card.addEventListener('mousemove', e=>{
  const rect = card.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const midX = rect.width/2;
  const midY = rect.height/2;

  const rotateY = ((x - midX)/midX)*10;
  const rotateX = -((y - midY)/midY)*10;

  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

card.addEventListener('mouseleave', ()=>{
  card.style.transform = `rotateX(0) rotateY(0)`;
});

/* Click morph */
let mode = 0;
card.addEventListener('click', ()=>{
  mode = (mode+1)%2;

  if(mode===1){
    card.style.borderRadius = '20px';
    card.style.width = '360px';
    card.style.height = '180px';
  } else {
    card.style.borderRadius = '50%';
    card.style.width = '320px';
    card.style.height = '320px';
  }
});
</script>

</body>
</html>
